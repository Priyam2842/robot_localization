ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Input sources
    odom0: odom
    odom0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_queue_size: 10

    imu0: /bno055/imu
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0_queue_size: 10

    # Process and measurement covariances (tuned conservatively)
    process_noise_covariance: [0.05, 0, 0, 0, 0, 0,
                               0, 0.05, 0, 0, 0, 0,
                               0, 0, 0.05, 0, 0, 0,
                               0, 0, 0, 0.05, 0, 0,
                               0, 0, 0, 0, 0.05, 0,
                               0, 0, 0, 0, 0, 0.05]

    odom0_twist_covariance: [0.05, 0, 0, 0, 0, 0,
                             0, 0.05, 0, 0, 0, 0,
                             0, 0, 0.05, 0, 0, 0,
                             0, 0, 0, 0.05, 0, 0,
                             0, 0, 0, 0, 0.05, 0,
                             0, 0, 0, 0, 0, 0.05]

    use_control: false
    stamped_tf: false
    transform_time_offset: 0.0

    # Additional tuning
    two_d_mode: false
    debug: false
